<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Security Learning Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
background:#000;
color:#00ff41;
font-family:'Share Tech Mono',monospace;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
background:#000;
}

body::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(
rgba(0,255,65,.03),
rgba(0,0,0,.15)
);
z-index:-1;
}

::-webkit-scrollbar{
width:10px;
}

::-webkit-scrollbar-track{
background:#000;
}

::-webkit-scrollbar-thumb{
background:#00ff41;
border-radius:20px;
}

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.85);
backdrop-filter:blur(12px);
border-bottom:1px solid #00ff41;
z-index:9999;
}

.logo{
font-size:30px;
font-family:'Orbitron',sans-serif;
font-weight:800;
text-shadow:
0 0 10px #00ff41,
0 0 25px #00ff41;
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
color:#00ff41;
text-decoration:none;
transition:.3s;
}

.nav-links a:hover{
text-shadow:0 0 15px #00ff41;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:0 20px;
}

.hero-content{
max-width:1000px;
}

.hero h1{
font-size:80px;
font-family:'Orbitron',sans-serif;
margin-bottom:25px;
text-shadow:
0 0 10px #00ff41,
0 0 30px #00ff41,
0 0 60px #00ff41;
}

.hero p{
font-size:22px;
line-height:2;
color:#b8ffca;
margin-bottom:40px;
}

.hero-btn{
padding:18px 40px;
background:#00ff41;
color:#000;
border:none;
font-size:17px;
font-weight:bold;
cursor:pointer;
border-radius:8px;
transition:.4s;
}

.hero-btn:hover{
transform:translateY(-5px);
box-shadow:0 0 30px #00ff41;
}

.section-title{
text-align:center;
font-size:55px;
font-family:'Orbitron',sans-serif;
margin-top:100px;
margin-bottom:60px;
text-shadow:0 0 20px #00ff41;
}

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(340px,1fr));
gap:30px;
padding:0 8%;
}

.card{
background:#050505;
border:1px solid #00ff41;
border-radius:15px;
padding:30px;
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px rgba(0,255,65,.5);
}

.card h3{
font-family:'Orbitron',sans-serif;
font-size:28px;
margin-bottom:15px;
}

.card p{
line-height:1.9;
color:#d4ffe0;
}

.info-box{
display:none;
margin-top:20px;
padding-top:20px;
border-top:1px solid #00ff41;
line-height:2;
color:#fff;
}

@media(max-width:768px){

.hero h1{
font-size:45px;
}

.nav-links{
display:none;
}

.section-title{
font-size:35px;
}

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<nav class="navbar">

<div class="logo">
CYBER HUB
</div>

<div class="nav-links">
<a href="#home">Home</a>
<a href="#topics">Topics</a>
<a href="#roadmap">Roadmap</a>
<a href="#faq">FAQ</a>
</div>

</nav>

<section class="hero" id="home">

<div class="hero-content">

<h1>CYBER SECURITY LEARNING HUB</h1>

<p>
Master Cyber Security, Ethical Hacking, Network Security,
Web Security, Digital Defense and Modern Cyber Awareness
through an immersive hacker styled learning platform.
</p>

<button class="hero-btn">
ENTER THE SYSTEM
</button>

</div>

</section>
